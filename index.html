<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Portofolio Saya</title>
    <link href="./dist/output.css" rel="stylesheet">
</head>
<!-- Perhatikan kode dark:bg-slate-900 dan dark:bg-slate-800 di bawah ini -->
<body class="bg-slate-100 text-slate-800 font-sans max-w-xl mx-auto my-12 p-8 bg-white rounded-xl shadow-lg border border-slate-200 transition-colors duration-300 dark:bg-slate-800 dark:text-slate-100 dark:border-slate-700">

    <!-- Tombol Mode Tema -->
    <button onclick="ubahTema()" class="mb-6 px-4 py-2 bg-slate-800 text-white text-sm font-medium rounded-lg hover:bg-slate-700 transition cursor-pointer dark:bg-blue-600 dark:hover:bg-blue-500">
        Ubah Mode Tema
    </button>

    <!-- 1. Bagian Judul Utama -->
    <h1 class="text-3xl font-bold text-slate-900 border-b-2 border-blue-500 pb-3 mb-4 dark:text-white">
        Profil Lengkap - MalMol08
    </h1>
    <p class="text-base text-slate-600 leading-relaxed dark:text-slate-300">
        Calon <span class="text-blue-600 font-semibold dark:text-blue-400">Fullstack DevOps Engineer</span> berbasis CachyOS Linux.
    </p>

    <!-- 2. Bagian Daftar Keahlian -->
    <h2 class="text-xl font-semibold text-slate-800 mt-6 mb-3 dark:text-slate-200">Target Keahlian Tech Stack:</h2>
    <ul class="space-y-2 list-disc list-inside text-slate-700 bg-slate-50 p-4 rounded-lg border border-slate-100 dark:bg-slate-900 dark:text-slate-300 dark:border-slate-800">
        <li><strong class="text-slate-900 dark:text-white">Frontend:</strong> Next.js & Tailwind CSS</li>
        <li><strong class="text-slate-900 dark:text-white">Backend:</strong> Node.js & PostgreSQL</li>
        <li><strong class="text-slate-900 dark:text-white">DevOps:</strong> Docker & GitHub Actions</li>
    </ul>

    <!-- 3. Bagian Link Interaktif -->
    <h2 class="text-xl font-semibold text-slate-800 mt-6 mb-3 dark:text-slate-200">Hubungi Saya:</h2>
    <p class="text-slate-600 dark:text-slate-400">
        Silakan kunjungi profil 
        <a href="https://github.com" target="_blank" class="inline-block text-white bg-blue-600 hover:bg-blue-700 font-medium px-4 py-1.5 rounded-md text-sm transition shadow-sm ml-1 dark:bg-slate-700 dark:hover:bg-slate-600">
            GitHub Resmi Saya
        </a> 
        di sini.
    </p>

    <script src="script.js"></script>
</body>
</html>
